<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
    <title>虎キング v1.9.1 by Popolo App.com</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #000; overflow: hidden; }
        #header { background: #1a1a1a; color: #ff9900; padding: 10px; text-align: center; font-weight: bold; position: fixed; width: 100%; height: 45px; z-index: 3000; border-bottom: 2px solid #ff9900; display: flex; justify-content: center; align-items: center; gap: 10px; box-sizing: border-box; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #222; }
        button { cursor: pointer; border-radius: 4px; font-weight: bold; border: none; }
        
        /* UI Panels */
        #user-list { position: fixed; top: 55px; right: 10px; z-index: 2000; background: rgba(0,0,0,0.8); color: #fff; padding: 8px; border-radius: 8px; width: 110px; max-height: 250px; overflow-y: auto; border: 1px solid #ff9900; font-size: 11px; }
        #pointSettingsPanel { position: fixed; top: 55px; left: 10px; z-index: 2000; width: 280px; max-height: 60vh; overflow-y: auto; background: rgba(255, 255, 255, 0.95); padding: 10px; border-radius: 12px; border: 2px solid #007AFF; display: none; color: #333; }
        
        /* Setup Overlay */
        #setup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 4000; display: flex; align-items: center; justify-content: center; color: white; }
        .setup-box { background: #222; padding: 20px; border-radius: 15px; border: 2px solid #ff9900; width: 85%; max-width: 320px; text-align: center; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .color-btn { aspect-ratio: 1/1; border-radius: 50%; border: 2px solid #fff; font-size: 9px; display: flex; align-items: center; justify-content: center; color: #fff; text-shadow: 1px 1px 1px #000; }

        /* Floating Buttons */
        .f-btn { position: fixed; right: 10px; z-index: 2000; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.5); border-radius: 50%; }
        #recenter-btn { bottom: 20px; background: #fff; color: #333; font-size: 20px; }
        #admin-btn { bottom: 80px; background: #ff4444; color: #fff; font-size: 12px; display: none; }
        
        .user-label { background: rgba(0,0,0,0.7); color: #fff; border: 1px solid #ff9900; font-size: 10px; padding: 1px 3px; border-radius: 3px; }
        .point-card { background: #f9f9f9; border: 1px solid #ddd; padding: 8px; margin-bottom: 5px; border-radius: 6px; font-size: 12px; }
    </style>
</head>
<body>

<div id="header">
    <span>虎キング v1.9.1</span>
    <button onclick="togglePanel()" style="background:#007AFF; color:#white; padding:4px 8px;">地点設定</button>
    <button id="unit-btn" onclick="nextUnit()" style="background:#333; color:#ff9900; border:1px solid #ff9900; padding:4px 8px;">kt</button>
</div>

<div id="user-list"><div style="color:#ff9900; border-bottom:1px solid #ff9900; margin-bottom:5px;">参加者</div><div id="list-content"></div></div>

<div id="pointSettingsPanel">
    <h4 style="margin:0 0 10px 0;">🚩 地点設定</h4>
    <div id="point-list"></div>
    <button onclick="clearAllObjects()" style="width:100%; background:#ff4444; color:white; padding:8px; margin-top:10px;">全マーク消去 (管理者)</button>
</div>

<div id="map"></div>

<div id="setup-overlay">
    <div class="setup-box">
        <h3>虎キング 設定</h3>
        <input type="text" id="user-name" placeholder="名前を入力" style="width:90%; padding:10px; margin-bottom:10px;">
        <div class="color-grid" id="setup-colors"></div>
    </div>
</div>

<button id="recenter-btn" class="f-btn" onclick="goMe()">🎯</button>
<button id="admin-btn" class="f-btn" onclick="adminMenu()">管理</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.gridlayer.googlemutant@latest/dist/Leaflet.GoogleMutant.js"></script>

<script>
    // --- Firebase設定 ---
    const firebaseConfig = { 
        apiKey: "AIzaSyB_OOgXiE1YkFzQK0Nujhnx3lNM_7dp66U", 
        authDomain: "tra-king.firebaseapp.com", 
        databaseURL: "https://tra-king-default-rtdb.firebaseio.com", 
        projectId: "tra-king", 
        storageBucket: "tra-king.firebasestorage.app", 
        messagingSenderId: "355068381368", 
        appId: "1:355068381368:web:440efbe59649791404cc4d" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 状態管理 ---
let myId = localStorage.getItem('tora_king_id') || "user_" + Date.now();
localStorage.setItem('tora_king_id', myId);
let myName = localStorage.getItem('tora_king_name');
let myColor = localStorage.getItem('tora_king_color');
let unitIdx = parseInt(localStorage.getItem('tora_unit') || "0");
const units = ["kt", "km/h", "m/s"];
const conv = [1.94384, 3.6, 1];

// --- マップ初期化 (安全版) ---
const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([26.3, 127.8], 13);

// 1. 万が一のために標準地図(OSM)を薄く敷いておく（真っ暗防止）
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { opacity: 0.5 }).addTo(map);

// 2. Googleマップを読み込む（エラーが出ても無視して進む設定）
try {
    if (typeof L.gridLayer.googleMutant === 'function') {
        L.gridLayer.googleMutant({ type: 'roadmap' }).addTo(map);
    } else {
        console.warn("GoogleMutant library not found.");
    }
} catch(e) {
    console.error("Google Maps Error:", e);
}

L.control.scale({ imperial: false, position: 'bottomleft' }).addTo(map);

const userMarkers = {}, userTrails = {}, objectMarkers = {};
let myMarker = null, isFollowing = false;





    // --- 1. ユーザー設定 (色・名前) ---
    const colors = { "赤":"#ff0000","青":"#0000ff","ピンク":"#ff66cc","紫":"#800080","緑":"#32cd32","黄":"#ffff00","黒":"#222222","白":"#ffffff" };
    if (!myName) {
        const grid = document.getElementById('setup-colors');
        for (let name in colors) {
            const b = document.createElement('div');
            b.className = 'color-btn'; b.style.background = colors[name]; b.innerText = name;
            b.onclick = () => {
                const n = document.getElementById('user-name').value;
                if (!n) return alert("名前を入れてね");
                myName = n; myColor = colors[name];
                localStorage.setItem('tora_king_name', n); localStorage.setItem('tora_king_color', myColor);
                document.getElementById('setup-overlay').style.display = 'none';
                startGPS();
            };
            grid.appendChild(b);
        }
    } else {
        document.getElementById('setup-overlay').style.display = 'none';
        startGPS();
    }

    // --- 2. GPS & 軌跡ロジック ---
    function startGPS() {
        navigator.geolocation.watchPosition(pos => {
            const {latitude: lat, longitude: lng, speed, heading} = pos.coords;
            const now = Date.now();
            const data = { lat, lng, name: myName, color: myColor, speed: speed||0, heading: heading||0, ts: now };
            db.ref('users/' + myId).set(data);

            if (!myMarker) {
                myMarker = L.marker([lat, lng], { icon: createArrow(myColor, heading, 30) }).addTo(map);
                myMarker.bindTooltip(myName, { permanent: true, direction: 'top', className: 'user-label' });
            } else {
                myMarker.setLatLng([lat, lng]).setIcon(createArrow(myColor, heading, 30));
            }
            if (isFollowing) map.panTo([lat, lng]);
        }, null, { enableHighAccuracy: true });
    }

    function createArrow(color, heading, size) {
        return L.divIcon({
            html: `<div style="transform:rotate(${heading||0}deg);"><svg viewBox="0 0 100 100" width="${size}" height="${size}"><path d="M50 5 L90 90 L50 75 L10 90 Z" fill="${color}" stroke="white" stroke-width="5"/></svg></div>`,
            className: '', iconSize: [size, size], iconAnchor: [size/2, size/2]
        });
    }

    // --- 3. ユーザー監視 & 軌跡描画 ---
    db.ref('users').on('value', snap => {
        const users = snap.val();
        const now = Date.now();
        let html = "";
        
        for (let id in users) {
            const u = users[id];
            if (!u.ts || now - u.ts > 43200000) { // 12時間で自動消去
                if (id !== myId) db.ref('users/' + id).remove(); 
                continue; 
            }

            // 10分更新なければリストから消す
            if (now - u.ts > 600000) {
                if (userMarkers[id]) { map.removeLayer(userMarkers[id]); delete userMarkers[id]; }
                continue;
            }

            // 速度表示
            const s = ((u.speed || 0) * conv[unitIdx]).toFixed(1);
            html += `<div style="border-bottom:1px solid #444; padding:3px 0;">
                <span style="color:${u.color}">●</span> ${u.name}<br>
                <span style="color:#0f0; font-size:10px;">${s} ${units[unitIdx]}</span>
            </div>`;

            // 他人のマーカー
            if (id !== myId) {
                if (!userMarkers[id]) {
                    userMarkers[id] = L.marker([u.lat, u.lng], { icon: createArrow(u.color, u.heading, 20) }).addTo(map);
                    userMarkers[id].bindTooltip(u.name, { permanent: true, direction: 'top', className: 'user-label' });
                } else {
                    userMarkers[id].setLatLng([u.lat, u.lng]).setIcon(createArrow(u.color, u.heading, 20));
                }
            }

            // --- 軌跡(Trail)ロジック ---
            if (!userTrails[id]) userTrails[id] = [];
            userTrails[id].push({ latlng: [u.lat, u.lng], ts: now });

            // 15秒以上前の軌跡データを削除
            userTrails[id] = userTrails[id].filter(t => now - t.ts < 15000);
            
            // 描画
            if (userMarkers[id + '_trail']) map.removeLayer(userMarkers[id + '_trail']);
            
            const latlngs = userTrails[id].map(t => t.latlng);
            if (latlngs.length > 1) {
                userMarkers[id + '_trail'] = L.polyline(latlngs, {
                    color: u.color, weight: 2, opacity: 0.8
                }).addTo(map);
                
                // 10秒後から薄くするアニメーション（簡易）
                setTimeout(() => {
                    if(userMarkers[id + '_trail']) userMarkers[id + '_trail'].setStyle({opacity: 0.2});
                }, 10000);
            }
        }
        document.getElementById('list-content').innerHTML = html;
    });

    // --- 4. 地点設置 (タップ & 連携) ---
    map.on('click', e => {
        const comment = prompt("コメントを入力してください");
        if (comment === null) return;
        saveObject(e.latlng.lat, e.latlng.lng, 'buoy', '#ff9900', comment);
    });

    function saveObject(lat, lng, type, color, comment) {
        db.ref('objects').push({ lat, lng, type, color, comment, ts: Date.now() });
    }

    db.ref('objects').on('child_added', snap => {
        const key = snap.key, obj = snap.val();
        if (Date.now() - obj.ts > 43200000) { db.ref('objects/' + key).remove(); return; }

        const icon = obj.type === 'ship' ? 
            L.divIcon({ html: '🚤', className: '', iconSize:[30,30], iconAnchor:[15,15] }) :
            L.divIcon({ html: `<div style="background:${obj.color}; width:12px; height:12px; border:2px solid white; border-radius:50%;"></div>`, className: '', iconSize:[12,12], iconAnchor:[6,6] });

        objectMarkers[key] = L.marker([obj.lat, obj.lng], { icon: icon }).addTo(map);
        objectMarkers[key].bindTooltip(obj.comment || '', { permanent: true, direction: 'top', className: 'user-label' });
        
        addPointCard(key, obj);
    });

    db.ref('objects').on('child_removed', snap => {
        const key = snap.key;
        if (objectMarkers[key]) { map.removeLayer(objectMarkers[key]); delete objectMarkers[key]; }
        const card = document.querySelector(`[data-key="${key}"]`);
        if (card) card.remove();
    });

    // --- 5. 地点設定パネル ---
    function addPointCard(key, obj) {
        const container = document.getElementById('point-list');
        const div = document.createElement('div');
        div.className = 'point-card'; div.dataset.key = key;
        div.innerHTML = `
            <select onchange="updObj('${key}', 'type', this.value)">
                <option value="buoy" ${obj.type==='buoy'?'selected':''}>マーク</option>
                <option value="ship" ${obj.type==='ship'?'selected':''}>船</option>
            </select>
            <select onchange="updObj('${key}', 'color', this.value)">
                <option value="#ff0000" ${obj.color==='#ff0000'?'selected':''}>赤</option>
                <option value="#ffff00" ${obj.color==='#ffff00'?'selected':''}>黄</option>
                <option value="#ff9900" ${obj.color==='#ff9900'?'selected':''}>橙</option>
                <option value="#ff66cc" ${obj.color==='#ff66cc'?'selected':''}>桃</option>
            </select><br>
            <input type="text" value="${obj.comment||''}" onchange="updObj('${key}', 'comment', this.value)" style="width:120px;">
            <button onclick="delObj('${key}')" style="background:#ff4444; color:white;">消</button>
        `;
        container.appendChild(div);
    }

    window.updObj = (key, field, val) => { db.ref('objects/' + key).update({ [field]: val }); };
    window.delObj = (key) => { if(confirm("削除しますか？")) db.ref('objects/' + key).remove(); };
    window.clearAllObjects = () => { if(confirm("【管理者】全マークを削除しますか？")) db.ref('objects').remove(); };

    // --- 6. 外部連携 (コース作くん) ---
    window.addEventListener('load', () => {
        const params = new URLSearchParams(window.location.search);
        const data = params.get('points');
        if (data) {
            data.split('|').forEach(p => {
                const [label, coord] = p.split(':');
                const [lat, lng] = coord.split(',').map(Number);
                if (!isNaN(lat)) saveObject(lat, lng, 'buoy', '#ff9900', label);
            });
            window.history.replaceState({}, '', window.location.pathname);
        }
    });

    // --- 7. 管理機能 & 便利機能 ---
    window.nextUnit = () => {
        unitIdx = (unitIdx + 1) % 3;
        localStorage.setItem('tora_unit', unitIdx);
        document.getElementById('unit-btn').innerText = units[unitIdx];
        db.ref('users').once('value');
    };
    window.togglePanel = () => {
        const p = document.getElementById('pointSettingsPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    };
    window.goMe = () => { isFollowing = true; if(myMarker) map.panTo(myMarker.getLatLng()); };
    
    // 管理者判定 (あなたのIDをここにメモしておくと便利です)
    db.ref('users/' + myId).on('value', snap => {
        if (snap.exists()) document.getElementById('admin-btn').style.display = 'flex';
    });

    window.adminMenu = () => {
        const action = prompt("管理者コマンド: 1:全ユーザー消去, 2:全データ消去");
        if (action === "1") db.ref('users').remove();
        if (action === "2") { db.ref('users').remove(); db.ref('objects').remove(); }
    };

</script>
</body>
</html>
