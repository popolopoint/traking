<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
    <title>虎キング v1.5.0 by Popolo App.com</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #000; overflow: hidden; }
        #header { background: #1a1a1a; color: #ff9900; padding: 10px; text-align: center; font-weight: bold; position: fixed; width: 100%; z-index: 3000; border-bottom: 2px solid #ff9900; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #000; }
        
        /* リスト */
        #user-list { position: fixed; top: 60px; right: 10px; z-index: 2000; background: rgba(0,0,0,0.8); color: #fff; padding: 10px; border-radius: 8px; width: 110px; max-height: 250px; overflow-y: auto; border: 1px solid #ff9900; font-size: 11px; }
        .list-title { color: #ff9900; font-weight: bold; border-bottom: 1px solid #ff9900; margin-bottom: 5px; }
        .user-item { border-bottom: 1px solid #444; padding: 4px 0; cursor: pointer; }
        .user-item.me { color: #00ff00; font-weight: bold; }
        
        /* ラベル */
        .user-label { background: rgba(0,0,0,0.7); color: #fff; border: 1px solid #ff9900; font-size: 11px; font-weight: bold; padding: 2px 5px; border-radius: 4px; white-space: nowrap; }
        .status-panel { position: fixed; bottom: 20px; right: 10px; z-index: 2000; background: rgba(0,0,0,0.8); color: #fff; padding: 8px; border-radius: 5px; font-size: 10px; }
        
        /* ボタン */
        #recenter-btn, #name-btn, #logout-btn { position: fixed; right: 10px; z-index: 2000; background: #fff; border: 2px solid #ff9900; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        #recenter-btn { bottom: 80px; font-size: 20px; }
        #name-btn { bottom: 135px; font-size: 18px; color: #333; }
        #logout-btn { bottom: 190px; background: #ff4444; border-color: #fff; color: white; font-size: 18px; }

        .popup-form { color: #333; min-width: 150px; }
        .popup-form select, .popup-form input { width: 100%; margin: 5px 0; padding: 5px; box-sizing: border-box; }
        .btn-save { background: #ff9900; color: white; border: none; width: 100%; padding: 8px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-del { background: #ff4444; color: white; border: none; width: 100%; padding: 6px; margin-top: 10px; cursor: pointer; border-radius: 4px; font-size: 11px; font-weight: bold; }
        
        /* 回転矢印アニメーション */
        .arrow-icon-wrapper { transition: transform 0.2s linear; }
    </style>
</head>
<body>

<div id="header">虎キング v1.5.0 by Popolo App.com</div>
<div id="user-list"><div class="list-title">参加者</div><div id="list-content"></div></div>
<div id="map"></div>
<div class="status-panel" id="status">位置情報取得中...</div>

<button id="logout-btn" onclick="logout()" title="ログアウト">🏃</button>
<button id="name-btn" onclick="changeName()">👤</button>
<button id="recenter-btn" onclick="goMe()">🎯</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // --- 初期設定 ---
    const firebaseConfig = { 
        apiKey: "AIzaSyB_OOgXiE1YkFzQK0Nujhnx3lNM_7dp66U", 
        authDomain: "tra-king.firebaseapp.com", 
        databaseURL: "https://tra-king-default-rtdb.firebaseio.com", 
        projectId: "tra-king", 
        storageBucket: "tra-king.firebasestorage.app", 
        messagingSenderId: "355068381368", 
        appId: "1:355068381368:web:440efbe59649791404cc4d" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myId = localStorage.getItem('tora_king_id') || "tiger_" + Math.floor(Math.random()*10000);
    localStorage.setItem('tora_king_id', myId);

    // ログアウト保留チェック
    if (localStorage.getItem('tora_king_logout_pending') === 'true') {
        db.ref('users/' + myId).remove().then(() => {
            localStorage.clear();
            location.href = location.pathname;
        });
        document.body.innerHTML = "<div style='color:white;text-align:center;padding:50px;'>ログアウト中...</div>";
        throw new Error("Logout Process");
    }

    // 名前と色の設定
    let myName = localStorage.getItem('tora_king_name');
    let myColor = localStorage.getItem('tora_king_color');

    const colorPresets = {
        "赤": "#ff0000", "青": "#0000ff", "ピンク": "#ff66cc", "紫": "#800080", 
        "オレンジ": "#ff9900", "黄色": "#ffff00", "黄緑": "#32cd32", "黒": "#000000", "白": "#ffffff"
    };

    if (!myName) {
        myName = prompt("参加名を入力してください", "選手") || "選手";
        localStorage.setItem('tora_king_name', myName);
    }
    if (!myColor) {
        const colorName = prompt("色を選んでください（赤,青,ピンク,紫,オレンジ,黄色,黄緑,黒,白）", "オレンジ");
        myColor = colorPresets[colorName] || "#ff9900";
        localStorage.setItem('tora_king_color', myColor);
    }

    const savedPos = JSON.parse(localStorage.getItem('tora_king_pos')) || { lat: 35.0, lng: 135.0, zoom: 15 };
    let speedUnitMode = 0, myMarker = null, isFollowing = false, watchId = null;
    const userMarkers = {}, objectMarkers = {};

    // --- 地図初期化 ---
    const map = L.map('map', {zoomControl: false}).setView([savedPos.lat, savedPos.lng], savedPos.zoom);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    // 縮尺メモリ（スケール）を表示
    L.control.scale({ imperial: false, position: 'bottomleft' }).addTo(map);

    // 矢印アイコンSVG作成
    function createArrowIcon(color, heading) {
        const rotate = heading || 0;
        const html = `
            <div class="arrow-icon-wrapper" style="transform: rotate(${rotate}deg); width:30px; height:30px;">
                <svg viewBox="0 0 100 100" width="30" height="30">
                    <path d="M50 5 L90 90 L50 75 L10 90 Z" fill="${color}" stroke="white" stroke-width="5" stroke-linejoin="round" />
                </svg>
            </div>`;
        return L.divIcon({ html: html, className: '', iconSize: [30, 30], iconAnchor: [15, 15] });
    }

    // --- 自位置取得 & 軌跡 ---
    if (navigator.geolocation) {
        watchId = navigator.geolocation.watchPosition(pos => {
            const {latitude, longitude, speed, heading} = pos.coords;
            const ts = Date.now();
            
            if (localStorage.getItem('tora_king_logout_pending') !== 'true') {
                db.ref('users/'+myId).set({lat: latitude, lng: longitude, name: myName, color: myColor, speed: speed||0, heading: heading||0, ts: ts});
            }
            
            const latlng = [latitude, longitude];

            // 履歴（軌跡）モード：5秒で消える
            const trail = L.circleMarker(latlng, { radius: 3, color: myColor, weight: 0, fillOpacity: 0.4 }).addTo(map);
            setTimeout(() => map.removeLayer(trail), 5000);

            if (!myMarker) {
                myMarker = L.marker(latlng, { icon: createArrowIcon(myColor, heading) }).addTo(map);
                myMarker.bindTooltip(myName, {permanent: true, direction: 'top', className: 'user-label'}).openTooltip();
            } else {
                myMarker.setLatLng(latlng);
                myMarker.setIcon(createArrowIcon(myColor, heading));
            }
            if (isFollowing) map.panTo(latlng);
            document.getElementById('status').innerText = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
        }, null, {enableHighAccuracy: true, timeout: 10000, maximumAge: 0});
    }

    // --- 同期 & オートクリーンアップ ---
    db.ref('users').on('value', snap => {
        const users = snap.val();
        if (!users) { document.getElementById('list-content').innerHTML = ""; return; }
        let listHtml = "";
        const now = Date.now();
        
        for (let id in users) {
            const u = users[id];
            if (!u.name || !u.lat) continue;

            // オートクリーンアップ：10分(600000ms)更新がないユーザーは地図から消す
            if (now - u.ts > 600000) {
                if(userMarkers[id]) { map.removeLayer(userMarkers[id]); delete userMarkers[id]; }
                continue; 
            }

            const isMe = (id === myId);
            const speedMs = u.speed || 0;
            let displaySpeed = (speedUnitMode === 0) ? (speedMs * 1.94384).toFixed(1) + " kt" : (speedMs * 3.6).toFixed(1) + " km/h";

            listHtml += `<div class="user-item ${isMe ? 'me' : ''}" onclick="toggleSpeedUnit()">
                <span style="color:${u.color}">●</span> ${u.name}<br><span style="color:#aaa; font-size:9px;">${displaySpeed}</span>
            </div>`;

            if (!isMe) {
                if (!userMarkers[id]) {
                    userMarkers[id] = L.marker([u.lat, u.lng], { icon: createArrowIcon(u.color, u.heading) }).addTo(map);
                    userMarkers[id].bindTooltip(u.name, {permanent: true, direction: 'top', className: 'user-label'}).openTooltip();
                } else {
                    userMarkers[id].setLatLng([u.lat, u.lng]);
                    userMarkers[id].setIcon(createArrowIcon(u.color, u.heading));
                }
            }
        }
        document.getElementById('list-content').innerHTML = listHtml;
    });

    // --- オブジェクト同期 ---
    db.ref('objects').on('value', snap => {
        for (let key in objectMarkers) map.removeLayer(objectMarkers[key]);
        const objects = snap.val();
        if (!objects) return;
        for (let key in objects) {
            const obj = objects[key];
            let iconHtml = (obj.type === 'ship') ? `<div style="font-size:18px;">🚤</div>` : 
                `<svg width="15" height="18" viewBox="0 0 100 120"><path d="M50 5 L95 100 Q95 115 50 115 Q5 115 5 100 Z" fill="${obj.color||'#ff9900'}" stroke="white" stroke-width="6" /></svg>`;
            const marker = L.marker([obj.lat, obj.lng], {
                icon: L.divIcon({ html: iconHtml, className: 'custom-icon', iconSize: [15, 18], iconAnchor: [7.5, 16] })
            }).addTo(map);
            marker.bindPopup(`<div class="popup-form" style="text-align:center;"><b>${obj.type==='ship'?'本部船':'ブイ'}</b><br>${obj.comment||''}<br><button class="btn-del" onclick="deleteObject('${key}')">🗑️ 削除</button></div>`);
            objectMarkers[key] = marker;
        }
    });

    // --- インタラクション ---
    map.on('click', e => {
        const { lat, lng } = e.latlng;
        const popupContent = `<div class="popup-form"><b>新規設置</b><select id="new_type" onchange="toggleColorSelect()"><option value="buoy">🚩 マークブイ</option><option value="ship">🚤 本部船</option></select><div id="color_area">色: <select id="new_color"><option value="pink">ピンク</option><option value="orange" selected>オレンジ</option><option value="red">赤</option><option value="green">緑</option><option value="yellow">黄色</option></select></div><input type="text" id="new_comment" placeholder="コメント"><button class="btn-save" onclick="saveObject(${lat}, ${lng})">共有</button></div>`;
        L.popup().setLatLng(e.latlng).setContent(popupContent).openOn(map);
    });

    window.toggleColorSelect = () => { document.getElementById('color_area').style.display = (document.getElementById('new_type').value === 'ship') ? 'none' : 'block'; };
    window.saveObject = (lat, lng) => {
        const type = document.getElementById('new_type').value, cMap = { pink: "#ff66cc", orange: "#ff9900", red: "#ff0000", green: "#00ff00", yellow: "#ffff00" };
        const color = cMap[document.getElementById('new_color').value], comment = document.getElementById('new_comment').value;
        db.ref('objects').push({ type, color, lat, lng, comment, ts: Date.now() });
        map.closePopup();
    };
    window.deleteObject = (key) => { if(confirm("削除しますか？")) db.ref('objects/' + key).remove().then(() => map.closePopup()); };
    window.toggleSpeedUnit = () => { speedUnitMode = (speedUnitMode + 1) % 2; db.ref('users').once('value', () => {}); };
    window.changeName = () => {
        let n = prompt("名前:", myName);
        if(n) { myName = n; localStorage.setItem('tora_king_name', n); db.ref('users/'+myId+'/name').set(n); }
    };
    window.goMe = () => { isFollowing = true; if(myMarker) map.panTo(myMarker.getLatLng()); };
    map.on('movestart', e => { if(!e.hard) isFollowing = false; });

    // ログアウト
    window.logout = () => {
        if (confirm("ログアウトして地図から消えますか？")) {
            if (watchId !== null) navigator.geolocation.clearWatch(watchId);
            localStorage.setItem('tora_king_logout_pending', 'true');
            location.reload();
        }
    };
</script>
</body>
</html>
