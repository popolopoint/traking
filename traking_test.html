<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
    <title>虎キング v2.0.2 by Popolo App.com</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #000; overflow: hidden; }
        #header { background: #1a1a1a; color: #ff9900; padding: 10px; text-align: center; font-weight: bold; position: fixed; width: 100%; height: 45px; z-index: 3000; border-bottom: 2px solid #ff9900; display: flex; justify-content: center; align-items: center; gap: 10px; box-sizing: border-box; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #222; }
        button { cursor: pointer; border-radius: 4px; font-weight: bold; border: none; }
        
        #user-list { position: fixed; top: 55px; right: 10px; z-index: 2000; background: rgba(0,0,0,0.8); color: #fff; padding: 8px; border-radius: 8px; width: 110px; max-height: 250px; overflow-y: auto; border: 1px solid #ff9900; font-size: 11px; }
        #pointSettingsPanel { position: fixed; top: 55px; left: 10px; z-index: 2000; width: 280px; max-height: 60vh; overflow-y: auto; background: rgba(255, 255, 255, 0.95); padding: 10px; border-radius: 12px; border: 2px solid #007AFF; display: none; color: #333; }
        
        #setup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 4000; display: flex; align-items: center; justify-content: center; color: white; }
        .setup-box { background: #222; padding: 20px; border-radius: 15px; border: 2px solid #ff9900; width: 85%; max-width: 320px; text-align: center; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .color-btn { aspect-ratio: 1/1; border-radius: 50%; border: 2px solid #fff; font-size: 9px; display: flex; align-items: center; justify-content: center; color: #fff; text-shadow: 1px 1px 1px #000; }

        .f-btn { position: fixed; right: 10px; z-index: 2000; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.5); border-radius: 50%; }
        #recenter-btn { bottom: 20px; background: #fff; color: #333; font-size: 20px; }
        #admin-btn { bottom: 80px; background: #ff4444; color: #fff; font-size: 12px; }
        
        .user-label { background: rgba(0,0,0,0.7); color: #fff; border: 1px solid #ff9900; font-size: 10px; padding: 1px 3px; border-radius: 3px; white-space: nowrap; }
        .point-card { background: #f9f9f9; border: 1px solid #ddd; padding: 8px; margin-bottom: 5px; border-radius: 6px; font-size: 12px; }
    </style>
</head>
<body>

<div id="header">
    <span style="font-size:14px;">虎キング v2.0.2</span>
    <button onclick="openSetup()" style="background:#007AFF; color:white; padding:4px 6px;">設定</button>
    <button onclick="togglePanel()" style="background:#444; color:white; padding:4px 6px;">地点</button>
    <button id="unit-btn" onclick="nextUnit()" style="background:#333; color:#ff9900; border:1px solid #ff9900; padding:4px 6px;">kt</button>
</div>



<div id="user-list">
    <div style="color:#ff9900; border-bottom:1px solid #ff9900; margin-bottom:5px;">参加者</div>
    <div id="list-content"></div>
</div>

<div id="pointSettingsPanel">
    <h4 style="margin:0 0 10px 0;">🚩 地点設定</h4>
    <div id="point-list"></div>
    <button onclick="clearAllObjects()" style="width:100%; background:#ff4444; color:white; padding:8px; margin-top:10px;">全マーク消去 (管理者)</button>
</div>

<div id="map"></div>


<div id="setup-overlay" style="display:none;">
    <div class="setup-box">
        <h3>虎キング 設定</h3>
        <input type="text" id="user-name" placeholder="名前を入力" style="width:90%; padding:10px; margin-bottom:10px;">
        <div class="color-grid" id="setup-colors"></div>
        <button onclick="closeSetup()" style="margin-top:15px; background:#555; color:white; padding:5px 10px; font-size:10px;">キャンセル</button>
    </div>
</div>



<button id="recenter-btn" class="f-btn" onclick="goMe()">🎯</button>
<button id="admin-btn" class="f-btn" onclick="adminMenu()">管理</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyB_OOgXiE1YkFzQK0Nujhnx3lNM_7dp66U", 
        authDomain: "tra-king.firebaseapp.com", 
        databaseURL: "https://tra-king-default-rtdb.firebaseio.com", 
        projectId: "tra-king", 
        storageBucket: "tra-king.firebasestorage.app", 
        messagingSenderId: "355068381368", 
        appId: "1:355068381368:web:440efbe59649791404cc4d" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myId = localStorage.getItem('tora_king_id') || "user_" + Date.now();
    localStorage.setItem('tora_king_id', myId);
    let myName = localStorage.getItem('tora_king_name');
    let myColor = localStorage.getItem('tora_king_color');
    let unitIdx = parseInt(localStorage.getItem('tora_unit') || "0");
    const units = ["kt", "km/h", "m/s"];
    const conv = [1.94384, 3.6, 1];

    // --- マップ初期化 ---
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([26.3, 127.8], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.control.scale({ imperial: false, position: 'bottomleft' }).addTo(map);

    const userMarkers = {}, userTrails = {}, objectMarkers = {};
    let myMarker = null, isFollowing = false;

// --- 設定画面の制御 ---
    const colors = { "赤":"#ff0000","青":"#0000ff","ピンク":"#ff66cc","紫":"#800080","緑":"#32cd32","黄":"#ffff00","黒":"#222222","白":"#ffffff" };
    
    // 色ボタンの生成
    function initSetupUI() {
        const grid = document.getElementById('setup-colors');
        grid.innerHTML = "";
        for (let name in colors) {
            const b = document.createElement('div');
            b.className = 'color-btn'; b.style.background = colors[name]; b.innerText = name;
            b.onclick = () => saveProfile(colors[name]);
            grid.appendChild(b);
        }
    }

    // 設定画面を開く
    function openSetup() {
        document.getElementById('user-name').value = myName || "";
        document.getElementById('setup-overlay').style.display = 'flex';
    }

    // 設定画面を閉じる
    function closeSetup() {
        if (!myName) return alert("最初に名前と色を設定してください");
        document.getElementById('setup-overlay').style.display = 'none';
    }

    // プロフィール保存
 
// プロフィールを保存して更新する関数
    function saveProfile(color) {
        const n = document.getElementById('user-name').value;
        if (!n) return alert("名前を入力してください");
        
        myName = n; 
        myColor = color;
        
        // ローカルに保存
        localStorage.setItem('tora_king_name', n);
        localStorage.setItem('tora_king_color', color);
        
        // --- マップ上の自分のマーカーの名前と色を即座に更新 ---
        if (myMarker) {
            // 色（アイコン）の更新
            myMarker.setIcon(createArrow(myColor, myMarker.options.heading || 0, 30));
            // 名前（ラベル）の更新
            myMarker.getTooltip().setContent(myName);
        }

        document.getElementById('setup-overlay').style.display = 'none';
        
        // GPSを開始（未開始の場合）
        startGPS(); 
    }





    // 初回起動時のチェック
    initSetupUI();
    if (!myName) openSetup(); else startGPS();

    // --- 2. GPS & アイコン生成 ---
    function startGPS() {
        navigator.geolocation.watchPosition(pos => {
            const {latitude: lat, longitude: lng, speed, heading} = pos.coords;
            const now = Date.now();
            db.ref('users/' + myId).set({ lat, lng, name: myName, color: myColor, speed: speed||0, heading: heading||0, ts: now });

            if (!myMarker) {
                myMarker = L.marker([lat, lng], { icon: createArrow(myColor, heading, 30) }).addTo(map);
                myMarker.bindTooltip(myName, { permanent: true, direction: 'top', className: 'user-label' });
            } else {
                myMarker.setLatLng([lat, lng]).setIcon(createArrow(myColor, heading, 30));
            }
            if (isFollowing) map.panTo([lat, lng]);
        }, null, { enableHighAccuracy: true });
    }

    function createArrow(color, heading, size) {
        return L.divIcon({
            html: `<div style="transform:rotate(${heading||0}deg);"><svg viewBox="0 0 100 100" width="${size}" height="${size}"><path d="M50 5 L90 90 L50 75 L10 90 Z" fill="${color}" stroke="white" stroke-width="3"/></svg></div>`,
            className: '', iconSize: [size, size], iconAnchor: [size/2, size/2]
        });
    }

    // --- 3. 参加者監視 & 軌跡 ---
    db.ref('users').on('value', snap => {
        const users = snap.val();
        const now = Date.now();
        let html = "";
        if(!users) return;

        for (let id in users) {
            const u = users[id];
            // 12時間自動消去
            if (u.ts && now - u.ts > 43200000) { db.ref('users/' + id).remove(); continue; }
            // 10分更新なしで非表示
            if (now - u.ts > 600000) { if(userMarkers[id]){map.removeLayer(userMarkers[id]); delete userMarkers[id];} continue; }

            const isMe = (id === myId);
            const speedVal = ((u.speed || 0) * conv[unitIdx]).toFixed(1);
            html += `<div style="border-bottom:1px solid #444; padding:3px 0; color:${isMe?'#0f0':'#fff'}">
                <span style="color:${u.color}">●</span> ${u.name}<br>
                <span style="color:#0f0; font-size:10px; margin-left:12px;">${speedVal} ${units[unitIdx]}</span>
            </div>`;

            if (!isMe) {
                if (!userMarkers[id]) {
                    userMarkers[id] = L.marker([u.lat, u.lng], { icon: createArrow(u.color, u.heading, 20) }).addTo(map);
                    userMarkers[id].bindTooltip(u.name, { permanent: true, direction: 'top', className: 'user-label' });
                } else {
                    userMarkers[id].setLatLng([u.lat, u.lng]).setIcon(createArrow(u.color, u.heading, 20));
                }
            }

            // 軌跡ロジック (15秒保持、10秒でフェード)
            if (!userTrails[id]) userTrails[id] = [];
            userTrails[id].push({ latlng: [u.lat, u.lng], ts: now });
            userTrails[id] = userTrails[id].filter(t => now - t.ts < 15000);

            if (userMarkers[id + '_trail']) map.removeLayer(userMarkers[id + '_trail']);
            const latlngs = userTrails[id].map(t => t.latlng);
            if (latlngs.length > 1) {
                const age = now - userTrails[id][0].ts;
                const opacity = age > 10000 ? 0.2 : 0.7;
                userMarkers[id + '_trail'] = L.polyline(latlngs, { color: u.color, weight: 2, opacity: opacity }).addTo(map);
            }
        }
        document.getElementById('list-content').innerHTML = html;
    });

    db.ref('users').on('child_removed', snap => {
        const id = snap.key;
        if(userMarkers[id]) { map.removeLayer(userMarkers[id]); delete userMarkers[id]; }
        if(userMarkers[id + '_trail']) { map.removeLayer(userMarkers[id + '_trail']); }
    });

    // --- 4. 地点設置 (ポップアップ & 縦長ブイ) ---
    map.on('click', e => {
        const lat = e.latlng.lat; const lng = e.latlng.lng;
        const formHtml = `
            <div style="font-size:12px; color:#333; min-width:140px;">
                <b>🚩 地点設置</b><br>
                種別: <select id="pop_type" style="width:100%; margin:4px 0;">
                    <option value="buoy">マーク</option><option value="ship">船</option>
                </select><br>
                色: <select id="pop_color" style="width:100%; margin:4px 0;">
                    <option value="#ff0000">赤</option><option value="#ffff00">黄</option>
                    <option value="#ff9900" selected>オレンジ</option><option value="#ff66cc">ピンク</option>
                </select><br>
                メモ: <input type="text" id="pop_comment" style="width:100%; box-sizing:border-box; margin:4px 0;"><br>
                <button onclick="confirmSave(${lat}, ${lng})" style="width:100%; background:#007AFF; color:white; padding:5px; border-radius:4px; font-weight:bold; margin-top:5px;">保存</button>
            </div>`;
        L.popup().setLatLng(e.latlng).setContent(formHtml).openOn(map);
    });

    window.confirmSave = (lat, lng) => {
        const type = document.getElementById('pop_type').value;
        const color = document.getElementById('pop_color').value;
        const comment = document.getElementById('pop_comment').value;
        db.ref('objects').push({ lat, lng, type, color, comment, ts: Date.now() });
        map.closePopup();
    };

    function createBuoyIcon(color) {
        const svg = `<svg viewBox="0 0 100 120" width="30" height="36"><path d="M50 5 Q55 5 90 110 L10 110 Q45 5 50 5 Z" fill="${color}" stroke="#000" stroke-width="5" stroke-linejoin="round"/></svg>`;
        return L.divIcon({ html: svg, className: '', iconSize: [30, 36], iconAnchor: [15, 36] });
    }

    db.ref('objects').on('child_added', snap => {
        const key = snap.key, obj = snap.val();
        if (Date.now() - obj.ts > 43200000) { db.ref('objects/' + key).remove(); return; }
        const icon = obj.type === 'ship' ? L.divIcon({ html: '<div style="font-size:24px;">🚤</div>', className: '', iconSize:[30,30], iconAnchor:[15,15] }) : createBuoyIcon(obj.color);
        objectMarkers[key] = L.marker([obj.lat, obj.lng], { icon: icon }).addTo(map);
        objectMarkers[key].bindTooltip(obj.comment || '', { permanent: true, direction: 'top', className: 'user-label' });
        addPointCard(key, obj);
    });

    db.ref('objects').on('child_removed', snap => {
        const key = snap.key;
        if (objectMarkers[key]) { map.removeLayer(objectMarkers[key]); delete objectMarkers[key]; }
        const card = document.querySelector(`[data-key="${key}"]`); if (card) card.remove();
    });

    function addPointCard(key, obj) {
        const container = document.getElementById('point-list');
        if(!container) return;
        const div = document.createElement('div'); div.className = 'point-card'; div.dataset.key = key;
        div.innerHTML = `<span style="font-weight:bold; color:#007AFF;">${obj.comment||'地点'}</span> 
            <button onclick="delObj('${key}')" style="background:#ff4444; color:white; border-radius:4px; padding:2px 5px; float:right;">削除</button>`;
        container.appendChild(div);
    }

    window.delObj = (key) => { if(confirm("削除しますか？")) db.ref('objects/' + key).remove(); };
    window.clearAllObjects = () => { if(confirm("全マークを削除しますか？")) db.ref('objects').remove(); };

    // --- 5. 外部連携 (コース作くん) ---
    window.addEventListener('load', () => {
        const params = new URLSearchParams(window.location.search);
        const data = params.get('points');
        if (data) {
            data.split('|').forEach(p => {
                const parts = p.split(':'); if(parts.length < 2) return;
                const label = parts[0]; const coords = parts[1].split(',');
                if(coords.length < 2) return;
                db.ref('objects').push({ lat: parseFloat(coords[0]), lng: parseFloat(coords[1]), type: 'buoy', color: '#ff9900', comment: label, ts: Date.now() });
            });
            window.history.replaceState({}, '', window.location.pathname);
        }
    });

    // --- 6. ユーティリティ ---
    window.nextUnit = () => {
        unitIdx = (unitIdx + 1) % 3;
        localStorage.setItem('tora_unit', unitIdx);
        document.getElementById('unit-btn').innerText = units[unitIdx];
        db.ref('users').once('value');
    };
    window.togglePanel = () => {
        const p = document.getElementById('pointSettingsPanel');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    };
    window.goMe = () => { isFollowing = true; if(myMarker) map.panTo(myMarker.getLatLng()); };
   
   
   
 
window.adminMenu = () => {
        const action = prompt("管理者コマンド\n1: 自分以外の全ユーザー消去\n2: 全データ消去\n3: 自分の情報を初期化して再設定");
        if (action === "1") {
            db.ref('users').once('value', snap => {
                snap.forEach(child => { if(child.key !== myId) db.ref('users/' + child.key).remove(); });
            });
        }
        if (action === "2") { if(confirm("本当にすべて消去しますか？")) { db.ref('users').remove(); db.ref('objects').remove(); } }
        if (action === "3") { localStorage.clear(); location.reload(); } // これで最初からやり直せます
    };
  
  
  
  
    map.on('movestart', () => isFollowing = false);








</script>
</body>
</html>
